kind: ServiceTemplate
version: v1
metadata:
  name: resume-chatbot
  description: "Process-backed chat agent for the resume room with storage, dataset, and web search tools"
  annotations:
    meshagent.service.id: "resume-chatbot"
agents:
  - name: resume-chatbot
    annotations:
      meshagent.agent.type: "ChatBot"
container:
  image: "us-central1-docker.pkg.dev/meshagent-public/images/cli:latest"
  command: "/usr/bin/meshagent process join --agent-name=resume-chatbot --channel chat --model=gpt-5.2 --storage --web-search --table-write candidates --table-write open_roles --table-write candidate_role_scores --room-rules=agents/resume_chatbot/rules.txt"
  environment:
    - name: MESHAGENT_TOKEN
      token:
        identity: resume-chatbot
  storage:
    room:
      - path: /data
        read_only: false
