kind: Service
version: v1
metadata:
  name: voice1
  description: "A voice powered agent that you can talk to."
  annotations:
    meshagent.service.id: meshagent.voicebot1
agents:                                        
  - name: voice1
    annotations:
      meshagent.agent.type: "VoiceBot"
container:
  image: "meshagent/cli:latest"
  command: "/usr/bin/meshagent voicebot join --agent-name=voice1 --room-rules agents/voice1/rules.txt"
  environment:
    - name: MESHAGENT_TOKEN
      token:
        identity: voice1
        api:
          livekit: {}
          queues:
            list: true
          messaging:
            broadcast: true
            list: true
            send: true
          database:
            list_tables: true
          sync: {}
          storage: {}
          containers:
            logs: true
            use_containers: true
          developer:
            logs: true
          agents:
            register_agent: true
            register_public_toolkit: true
            register_private_toolkit: true
            call: true
            use_agents: true
            use_tools: true
            allowed_toolkits: null
